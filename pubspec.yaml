name: aipray
description: "AI Prayer - Smart Buddhist Chanting Companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  intl: ^0.20.2
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  speech_to_text: ^7.0.0
  flutter_animate: ^4.5.2
  vibration: ^2.0.0
  http: ^1.2.2
  record: ^5.2.0
  device_info_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/data/chants/
