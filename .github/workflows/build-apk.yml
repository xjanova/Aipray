name: Build & Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    # Skip if commit message is version bump (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[auto-version]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in pubspec.yaml
        id: bump
        run: |
          # Read current version from pubspec.yaml
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION=$(echo "$CURRENT" | sed 's/+.*//')
          BUILD=$(echo "$CURRENT" | grep -oP '\+\K[0-9]+' || echo "1")

          # Bump build number
          NEW_BUILD=$((BUILD + 1))

          # Check if this tag already exists
          if git ls-remote --tags origin "v${VERSION}" | grep -q "v${VERSION}"; then
            # Tag exists, bump patch version
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            NEW_BUILD=1
          fi

          NEW_VERSION="${VERSION}+${NEW_BUILD}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping to: $NEW_VERSION"

          # Update pubspec.yaml
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml

          # Update hardcoded version in update_service.dart if exists
          if [ -f lib/services/update_service.dart ]; then
            sed -i "s/static const String currentVersion = '.*'/static const String currentVersion = '${VERSION}'/" lib/services/update_service.dart
          fi

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml lib/services/update_service.dart || true
          git diff --cached --quiet || git commit -m "Bump version to ${{ steps.bump.outputs.full_version }} [auto-version]"
          git push

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Build APK (fat APK - all ABIs)
        run: flutter build apk --release

      - name: Build APK (split per ABI - smaller size)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          VERSION="${{ steps.bump.outputs.version }}"

          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/aipray-${VERSION}-universal.apk

          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/aipray-${VERSION}-arm64.apk

          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             build/app/outputs/flutter-apk/aipray-${VERSION}-arm32.apk

          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
             build/app/outputs/flutter-apk/aipray-${VERSION}-x86_64.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: |
            build/app/outputs/flutter-apk/aipray-*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: "Aipray v${{ steps.bump.outputs.version }}"
          body: |
            ## Aipray v${{ steps.bump.outputs.version }} - สวดมนต์อัจฉริยะ

            ### ดาวน์โหลด APK
            - **aipray-universal.apk** — ใช้ได้กับทุกอุปกรณ์ (แนะนำ)
            - **aipray-arm64.apk** — สำหรับมือถือรุ่นใหม่ (เล็กกว่า)
            - **aipray-arm32.apk** — สำหรับมือถือรุ่นเก่า

            ### วิธีติดตั้ง
            1. ดาวน์โหลดไฟล์ APK ที่ตรงกับอุปกรณ์ (ไม่แน่ใจให้เลือก universal)
            2. เปิดไฟล์บนมือถือ Android
            3. อนุญาต "ติดตั้งจากแหล่งที่ไม่รู้จัก" ถ้ามี popup
            4. กด "ติดตั้ง"

            ### คุณสมบัติ
            - บทสวดมนต์ 20+ บท พร้อมตัวอักษรไทย
            - ฟังเสียงสวดจับตำแหน่งอัตโนมัติ (AI)
            - นับรอบอัตโนมัติ พร้อมสั่นเตือน
            - บันทึกประวัติการสวดมนต์
            - อัพเดทอัตโนมัติภายในแอพ
            - ใช้งานออฟไลน์ได้
          files: |
            build/app/outputs/flutter-apk/aipray-*.apk
          draft: false
          prerelease: false
